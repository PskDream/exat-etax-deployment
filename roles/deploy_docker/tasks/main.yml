---
- name: "[{{ service_name }}] Get ECR token"
  command: >
    aws ecr get-login-password --region {{ aws_region }}
  register: ecr_token
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "[{{ service_name }}] Login to ECR"
  community.docker.docker_login:
    registry_url: "{{ ecr_registry }}"
    username: AWS
    password: "{{ ecr_token.stdout }}"
    reauthorize: true
  no_log: true

- name: "[{{ service_name }}] Pull image"
  community.docker.docker_image:
    name: "{{ ecr_registry }}/{{ svc.repository }}"
    tag: "{{ image_tag }}"
    source: pull
    force_source: true

- name: "[{{ service_name }}] Ensure compose directory exists"
  file:
    path: "/opt/{{ service_name }}"
    state: directory
    mode: "0755"
  become: true

- name: "[{{ service_name }}] Template docker-compose.yml"
  template:
    src: "{{ lookup('first_found', {'files': ['docker-compose.' + service_name + '.yml.j2', 'docker-compose.yml.j2'], 'paths': [role_path + '/templates']}) }}"
    dest: "/opt/{{ service_name }}/docker-compose.yml"
    mode: "0644"
  become: true

- name: "[{{ service_name }}] Deploy via docker compose"
  community.docker.docker_compose_v2:
    project_src: "/opt/{{ service_name }}"
    state: present
    pull: never

- name: "[{{ service_name }}] Wait for healthy"
  community.docker.docker_container_info:
    name: "{{ service_name }}"
  register: container_info
  until: container_info.container.State.Health.Status == "healthy"
  retries: 12
  delay: 5
  failed_when: container_info.container.State.Health.Status == "unhealthy"

- name: "[{{ service_name }}] Cleanup old images"
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: true

- name: "[{{ service_name }}] Done"
  debug:
    msg: "✅ {{ inventory_hostname }} — {{ service_name }}:{{ image_tag }}"
